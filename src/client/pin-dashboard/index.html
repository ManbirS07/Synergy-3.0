<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>GridForGood PIN Dashboard</title>
		<style>
			:root {
				--bg: #060d1b;
				--card: #121d3c;
				--line: #273a72;
				--text: #eef4ff;
				--muted: #95a8d7;
				--accent: #4ade80;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
				color: var(--text);
				background:
					radial-gradient(circle at 15% 10%, #1d2d69 0%, transparent 42%),
					radial-gradient(circle at 90% 0%, #165453 0%, transparent 36%),
					var(--bg);
				display: grid;
				place-items: center;
				padding: 1rem;
			}

			.layout {
				width: min(1100px, 100%);
				display: grid;
				gap: 1rem;
			}

			.banner {
				display: none;
				background: linear-gradient(90deg, #164130, #237e55);
				border: 1px solid #35b476;
				border-radius: 14px;
				padding: 0.9rem 1rem;
				font-weight: 700;
			}

			.stats {
				display: grid;
				grid-template-columns: repeat(4, minmax(0, 1fr));
				gap: 1rem;
			}

			.card {
				background: linear-gradient(140deg, #1a2858, var(--card));
				border: 1px solid var(--line);
				border-radius: 16px;
				padding: 1rem;
			}

			.label {
				font-size: 0.9rem;
				color: var(--muted);
			}

			.value {
				margin-top: 0.35rem;
				font-size: 1.7rem;
				font-weight: 700;
			}

			.panel {
				background: #0a1329;
				border: 1px solid var(--line);
				border-radius: 16px;
				padding: 1rem;
			}

			.mono {
				font-family: 'Consolas', 'Courier New', monospace;
				font-size: 0.92rem;
				color: #bfd0ff;
				word-break: break-all;
			}

			ul {
				margin: 0.8rem 0 0;
				padding-left: 1.2rem;
				color: var(--muted);
			}

			@media (max-width: 860px) {
				.stats {
					grid-template-columns: repeat(2, minmax(0, 1fr));
				}
			}
		</style>
	</head>
	<body>
		<main class="layout">
			<div class="banner" id="found-banner"></div>

			<section class="stats">
				<article class="card">
					<div class="label">Active Nodes (20s)</div>
					<div class="value" id="active-nodes">0</div>
				</article>
				<article class="card">
					<div class="label">Ranges Checked</div>
					<div class="value" id="ranges-checked">0</div>
				</article>
				<article class="card">
					<div class="label">Search Completion</div>
					<div class="value" id="completion">0%</div>
				</article>
				<article class="card">
					<div class="label">Current Target Hash</div>
					<div class="value mono" id="target-hash">n/a</div>
				</article>
			</section>

			<section class="panel">
				<div class="label">Latest Completed Ranges</div>
				<ul id="range-log"></ul>
			</section>
		</main>

		<script type="module" src="./dashboard.js"></script>
	</body>
</html>
