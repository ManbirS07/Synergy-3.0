<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
			<title>Synergy Mandelbrot Live View</title>
		<style>
			:root {
				--bg: #0a0f1f;
				--card: #131b33;
				--line: #243153;
				--text: #eef3ff;
				--muted: #96a6d8;
			}

			* { box-sizing: border-box; }

			body {
				margin: 0;
				min-height: 100vh;
				font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
				color: var(--text);
				background:
					radial-gradient(circle at 20% 15%, #1b2b66 0%, transparent 45%),
					radial-gradient(circle at 80% 0%, #173c4f 0%, transparent 40%),
					var(--bg);
				display: grid;
				place-items: center;
				padding: 1rem;
			}

			.layout {
				width: min(1200px, 100%);
				display: grid;
				gap: 1rem;
			}

			.stats {
				display: grid;
				grid-template-columns: repeat(4, minmax(0, 1fr));
				gap: 1rem;
			}

			.navbar {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 1rem;
				min-height: 72px;
				padding: 0.85rem 1rem;
				border: 1px solid #2c4b6b;
				border-radius: 16px;
				background: rgba(8, 18, 34, 0.88);
				backdrop-filter: blur(10px);
				box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
			}

			.brand {
				color: #f3f8ff;
				text-decoration: none;
				font-weight: 800;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				white-space: nowrap;
			}

			.nav-links {
				display: flex;
				align-items: center;
				gap: 0.55rem;
				flex-wrap: wrap;
			}

			.nav-link {
				color: #c6d8ee;
				text-decoration: none;
				padding: 0.5rem 0.8rem;
				display: inline-flex;
				align-items: center;
				min-height: 38px;
				border-radius: 999px;
				border: 1px solid transparent;
				font-weight: 600;
				transition: transform 160ms ease, background-color 160ms ease, color 160ms ease, border-color 160ms ease;
			}

			.nav-link:hover {
				color: #f3f8ff;
				border-color: #3c5f83;
				background: rgba(255, 255, 255, 0.08);
				transform: translateY(-1px);
			}

			.nav-link.active {
				color: #081626;
				background: #4fd1a7;
				border-color: #4fd1a7;
				font-weight: 700;
			}

			.card {
				background: linear-gradient(140deg, #1a2550, var(--card));
				border: 1px solid var(--line);
				border-radius: 16px;
				padding: 1rem;
			}

			.label { color: var(--muted); font-size: 0.9rem; }
			.value { margin-top: 0.35rem; font-size: 1.7rem; font-weight: 700; }

			.canvas-card {
				padding: 1rem;
				border-radius: 16px;
				background: #070b16;
				border: 1px solid var(--line);
			}

			#mandelbrot {
				display: block;
				width: 100%;
				max-width: 960px;
				aspect-ratio: 1 / 1;
				margin: 0 auto;
				background: #02040a;
				border: 1px solid #1d2a4a;
			}

			@media (max-width: 860px) {
				.stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
			}
		</style>
	</head>
	<body>
		<main class="layout">
			<nav class="navbar" aria-label="Primary">
				<a class="brand" href="../index.html">Synergy</a>
				<div class="nav-links">

					<a class="nav-link" href="../dashboard/index.html">Server Dashboard</a>
					<a class="nav-link active" href="./index.html">Mandelbrot Dashboard</a>
					<a class="nav-link" href="../pin-dashboard/index.html">PIN Dashboard</a>
					<a class="nav-link" href="../matrix-dashboard/index.html">Matrix Dashboard</a>
				</div>
			</nav>
			<section class="stats">
				<article class="card">
					<div class="label">Active Nodes (last 2s)</div>
					<div class="value" id="active-nodes">0</div>
				</article>
				<article class="card">
					<div class="label">Chunks Processed</div>
					<div class="value" id="chunks-processed">0</div>
				</article>
				<article class="card">
					<div class="label">In Progress</div>
					<div class="value" id="chunks-in-progress">0</div>
				</article>
				<article class="card">
					<div class="label">Completion</div>
					<div class="value" id="completion">0%</div>
				</article>
			</section>

			<section class="canvas-card">
				<canvas id="mandelbrot" width="960" height="960"></canvas>
			</section>
		</main>

		<script type="module" src="/client/mandelbrot-dashboard/dashboard.js"></script>
	</body>
</html>
