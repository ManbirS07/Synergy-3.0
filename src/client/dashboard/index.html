<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
			<title>Synergy Server Dashboard</title>
		<style>
			:root {
				--bg: #091425;
				--panel: #12233d;
				--line: #254064;
				--text: #eaf3ff;
				--muted: #9cb2d3;
				--ok: #30d39b;
				--warn: #f8c965;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
				color: var(--text);
				background:
					radial-gradient(circle at 15% 20%, #17325f 0%, transparent 38%),
					radial-gradient(circle at 80% 0%, #12453d 0%, transparent 35%),
					var(--bg);
				padding: 1rem;
			}

			.layout {
				width: min(1200px, 100%);
				margin: 0 auto;
				display: grid;
				gap: 1rem;
			}

			.stats {
				display: grid;
				grid-template-columns: repeat(3, minmax(0, 1fr));
				gap: 1rem;
			}

			.navbar {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 1rem;
				min-height: 72px;
				padding: 0.85rem 1rem;
				border: 1px solid #2c4b6b;
				border-radius: 16px;
				background: rgba(8, 18, 34, 0.88);
				backdrop-filter: blur(10px);
				box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
			}

			.brand {
				color: #f3f8ff;
				text-decoration: none;
				font-weight: 800;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				white-space: nowrap;
			}

			.nav-links {
				display: flex;
				align-items: center;
				gap: 0.55rem;
				flex-wrap: wrap;
			}

			.nav-link {
				color: #c6d8ee;
				text-decoration: none;
				padding: 0.5rem 0.8rem;
				display: inline-flex;
				align-items: center;
				min-height: 38px;
				border-radius: 999px;
				border: 1px solid transparent;
				font-weight: 600;
				transition: transform 160ms ease, background-color 160ms ease, color 160ms ease, border-color 160ms ease;
			}

			.nav-link:hover {
				color: #f3f8ff;
				border-color: #3c5f83;
				background: rgba(255, 255, 255, 0.08);
				transform: translateY(-1px);
			}

			.nav-link.active {
				color: #081626;
				background: #4fd1a7;
				border-color: #4fd1a7;
				font-weight: 700;
			}

			.card {
				background: linear-gradient(140deg, #173058, var(--panel));
				border: 1px solid var(--line);
				border-radius: 16px;
				padding: 1rem;
			}

			.label {
				font-size: 0.9rem;
				color: var(--muted);
			}

			.value {
				margin-top: 0.35rem;
				font-size: 1.9rem;
				font-weight: 700;
			}

			.task-grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
				gap: 1rem;
			}

			.task-card {
				background: #0f1c32;
				border: 1px solid var(--line);
				border-radius: 14px;
				padding: 1rem;
			}

			.node-card {
				background: linear-gradient(145deg, #10294d, #0d1730);
				border-style: solid;
				border-color: #3a5d8f;
				box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
			}

			.task-head {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 0.5rem;
			}

			.task-head h3 {
				margin: 0;
				font-size: 1.1rem;
			}

			.task-flags {
				display: flex;
				gap: 0.45rem;
				flex-wrap: wrap;
			}

			.pill {
				border-radius: 999px;
				padding: 0.2rem 0.7rem;
				font-size: 0.8rem;
				font-weight: 600;
				border: 1px solid transparent;
			}

			.pill-on {
				color: #072015;
				background: var(--ok);
			}

			.pill-off {
				color: #f5ecde;
				background: #9f6a2f;
			}

			.task-meta {
				margin-top: 0.8rem;
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 0.55rem;
			}

			.node-card .node-meta {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}

			.node-card .node-identity {
				grid-column: 1 / -1;
			}

			.node-card .node-identity strong {
				word-break: break-all;
			}

			.node-card .node-count {
				font-size: 1.6rem;
				color: var(--ok);
			}

			.task-meta span {
				display: block;
				font-size: 0.75rem;
				color: var(--muted);
			}

			.task-meta strong {
				font-size: 1rem;
			}

			.task-actions {
				margin-top: 0.9rem;
				display: flex;
				gap: 0.6rem;
				flex-wrap: wrap;
			}

			.btn {
				border: 0;
				border-radius: 10px;
				padding: 0.5rem 0.8rem;
				font-weight: 700;
				background: var(--ok);
				color: #062217;
				cursor: pointer;
			}

			.btn-secondary {
				background: transparent;
				border: 1px solid var(--line);
				color: var(--text);
			}

			@media (max-width: 760px) {
				.stats {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>
	<body>
		<main class="layout">
			<nav class="navbar" aria-label="Primary">
				<a class="brand" href="../index.html">Synergy</a>
				<div class="nav-links">

					<a class="nav-link active" href="./index.html">Server Dashboard</a>
					<a class="nav-link" href="../mandelbrot-dashboard/index.html">Mandelbrot Dashboard</a>
					<a class="nav-link" href="../pin-dashboard/index.html">PIN Dashboard</a>
					<a class="nav-link" href="../matrix-dashboard/index.html">Matrix Dashboard</a>
				</div>
			</nav>
			<section class="stats">
				<article class="card">
					<div class="label">Total Tasks</div>
					<div class="value" id="total-tasks">0</div>
				</article>
				<article class="card">
					<div class="label">Requesting Help</div>
					<div class="value" id="requesting-help">0</div>
				</article>
				<article class="card">
					<div class="label">Active Nodes (last 2s)</div>
					<div class="value" id="active-nodes">0</div>
				</article>
			</section>

			<section class="task-grid" id="task-list"></section>

			<section class="task-grid" id="node-list"></section>
		</main>

		<script type="module" src="/client/dashboard/dashboard.js"></script>
	</body>
</html>
