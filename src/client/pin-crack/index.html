<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>GridForGood PIN Crack Node</title>
		<style>
			:root {
				--bg: #081022;
				--panel: #111d3d;
				--line: #2a3f78;
				--text: #eef4ff;
				--muted: #9caed8;
				--accent: #32d399;
			}

			body {
				margin: 0;
				font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
				color: var(--text);
				background:
					radial-gradient(circle at 20% 10%, #172e64 0%, transparent 45%),
					radial-gradient(circle at 90% 0%, #18364f 0%, transparent 35%),
					var(--bg);
			}

			.page {
				max-width: 900px;
				margin: 0 auto;
				padding: 1.2rem;
			}

			.hero {
				background: #f6f9ff;
				color: #1a2240;
				border-radius: 16px;
				padding: 1.3rem;
			}

			.card {
				margin-top: 1rem;
				background: var(--panel);
				border: 1px solid var(--line);
				border-radius: 16px;
				padding: 1rem;
			}

			.row {
				display: flex;
				flex-wrap: wrap;
				gap: 0.7rem;
				align-items: center;
			}

			.btn {
				border: 0;
				border-radius: 10px;
				padding: 0.55rem 0.85rem;
				font-weight: 700;
				cursor: pointer;
			}

			.btn-primary {
				background: var(--accent);
				color: #082116;
			}

			.btn-secondary {
				background: transparent;
				border: 1px solid var(--line);
				color: var(--text);
			}

			.pill {
				border: 1px solid var(--line);
				border-radius: 999px;
				padding: 0.3rem 0.75rem;
				font-size: 0.88rem;
				color: var(--muted);
			}

			.mono {
				font-family: 'Consolas', 'Courier New', monospace;
			}

			#status {
				margin-top: 0.75rem;
				color: var(--muted);
			}
		</style>
	</head>
	<body>
		<main class="page">
			<section class="hero">
				<h1>Authorized Security Audit Simulation</h1>
				<p>
					This node contributes browser compute to crack a 4-digit PIN from a
					SHA-256 hash. Work is distributed through
					<code class="mono">pin_chunk_queue</code>.
				</p>
			</section>

			<section class="card">
				<div class="row">
					<button class="btn btn-primary" id="toggle-compute">Enable PIN Compute</button>
					<button class="btn btn-secondary" id="reset-pin">Reset PIN Task</button>
					<span class="pill">Default Hash: <strong id="target-hash" class="mono">n/a</strong></span>
					<span class="pill">Node: <strong id="node-id" class="mono">disconnected</strong></span>
					<span class="pill">Chunks Donated: <strong id="donated-chunks">0</strong></span>
				</div>
				<div id="status">Idle. Enable PIN Compute to start.</div>
			</section>
		</main>

		<script type="module" src="./widget.js"></script>
	</body>
</html>
